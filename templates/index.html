<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Livraria Digital - MVP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="bg-gray-50 font-sans">

    <header class="bg-white shadow-sm p-4 sticky top-0 z-10">
        <div class="max-w-4xl mx-auto flex items-center gap-4">
            <h1 class="text-xl font-bold text-indigo-600">Livraria</h1>
            <input type="text" id="input-busca" placeholder="Buscar por título ou autor..."
                   class="flex-1 border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-500">
            <button id="btn-buscar" class="bg-indigo-600 text-white px-6 py-2 rounded-lg hover:bg-indigo-700 transition">
                Buscar
            </button>
        </div>
    </header>

    <main class="max-w-4xl mx-auto p-6">
        <div id="lista-livros" class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="bg-white p-4 rounded-xl shadow-md border border-gray-100 flex gap-4">
                <div class="w-24 h-32 bg-gray-200 rounded-md flex items-center justify-center text-gray-400">Capa</div>
                <div class="flex-1">
                    <h2 class="text-lg font-bold">Dom Casmurro</h2>
                    <p class="text-gray-600 text-sm italic">Machado de Assis</p>
                    <p class="text-indigo-600 font-bold mt-2">R$ 45,90</p>
                    <div class="mt-4 flex gap-2">
                        <button class="text-sm bg-gray-100 px-3 py-1 rounded hover:bg-gray-200">❤️ Favoritar</button>
                        <button id="btn-comprar" class="text-sm bg-green-500 text-white px-3 py-1 rounded hover:bg-green-600">
                            Comprar
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <div id="checkout-section" class="hidden mt-10 p-6 bg-white rounded-2xl shadow-lg border-2 border-indigo-100 text-center">
            <h2 class="text-2xl font-bold mb-4">Pagamento via QR Code</h2>
            <div class="bg-gray-100 w-48 h-48 mx-auto mb-4 flex items-center justify-center border-2 border-dashed border-gray-300">
                <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=LivrariaMVP-Pagamento" alt="QR Code">
            </div>
            <p class="text-gray-500 text-sm">Escaneie o código acima para pagar via PIX</p>
            <button onclick="document.getElementById('checkout-section').classList.add('hidden')" class="mt-4 text-indigo-600 underline">Voltar</button>
        </div>
    </main>

    <script>
    document.getElementById('btn-buscar').addEventListener('click', function() {
        const termo = document.getElementById('input-busca').value;

        // Chamada real para a API de busca que criamos no app.py
        fetch(`/api/buscar?q=${termo}`)
            .then(response => response.json())
            .then(data => {
                const lista = document.getElementById('lista-livros');
                lista.innerHTML = ''; // Limpa a lista atual

                if (data.length === 0) {
                    lista.innerHTML = '<p class="col-span-2 text-center text-gray-500">Nenhum livro encontrado.</p>';
                    return;
                }

                data.forEach(livro => {
                    lista.innerHTML += `
                        <div class="bg-white p-4 rounded-xl shadow-md border border-gray-100 flex gap-4">
                            <div class="w-24 h-32 bg-indigo-100 rounded-md flex items-center justify-center text-indigo-400 font-bold">Livro</div>
                            <div class="flex-1">
                                <h2 class="text-lg font-bold">${livro.titulo}</h2>
                                <p class="text-gray-600 text-sm italic">${livro.autor}</p>
                                <p class="text-indigo-600 font-bold mt-2">R$ ${livro.preco.toFixed(2)}</p>
                                <div class="mt-4 flex gap-2">
                                    <button class="text-sm bg-gray-100 px-3 py-1 rounded hover:bg-gray-200">❤️ Favoritar</button>
                                    <button class="text-sm bg-green-500 text-white px-3 py-1 rounded">Comprar</button>
                                </div>
                            </div>
                        </div>
                    `;
                });
            });
    });
</script>
</body>
</html>
